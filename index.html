<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>ModalHP - Kelola Usaha Cuma Modal HP</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <script>
      // SW Recovery: if app doesn't render in 4s, clear stale SW & reload
      (function() {
        if (sessionStorage.getItem('sw_recovery')) return; // prevent loop
        setTimeout(function() {
          var app = document.getElementById('app');
          if (app && app.children.length === 0) {
            sessionStorage.setItem('sw_recovery', '1');
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function(regs) {
                var tasks = regs.map(function(r) { return r.unregister(); });
                return Promise.all(tasks);
              }).then(function() {
                return caches.keys();
              }).then(function(names) {
                return Promise.all(names.map(function(n) { return caches.delete(n); }));
              }).then(function() {
                location.reload();
              });
            } else {
              location.reload();
            }
          } else {
            sessionStorage.removeItem('sw_recovery');
          }
        }, 4000);
      })();
    </script>
  </body>
</html>
