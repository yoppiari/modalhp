services:
  app:
    build: .
    restart: always
    networks:
      - web
    labels:
      - "traefik.enable=true"
      # HTTP router - matches domain, www, and IP
      - "traefik.http.routers.toolsumkm.rule=Host(`modalhp.com`) || Host(`www.modalhp.com`) || Host(`72.62.127.3`)"
      - "traefik.http.routers.toolsumkm.entrypoints=web"
      # HTTPS router - matches domain, www, and IP
      - "traefik.http.routers.toolsumkm-secure.rule=Host(`modalhp.com`) || Host(`www.modalhp.com`) || Host(`72.62.127.3`)"
      - "traefik.http.routers.toolsumkm-secure.entrypoints=websecure"
      - "traefik.http.routers.toolsumkm-secure.tls=true"
      # Service port
      - "traefik.http.services.toolsumkm.loadbalancer.server.port=80"

networks:
  web:
    driver: bridge
