services:
  app:
    build: .
    restart: always
    networks:
      - web
    labels:
      - "traefik.enable=true"
      # Route based on the IP or a Domain (using HostRegexp for now to catch the IP)
      - "traefik.http.routers.toolsumkm.rule=Host(`72.62.127.3`)"
      - "traefik.http.routers.toolsumkm.entrypoints=web"
      - "traefik.http.services.toolsumkm.loadbalancer.server.port=80"

networks:
  web:
    external: true
